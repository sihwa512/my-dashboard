<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>綜合資產戰情室 V21.0</title>
    <style>
        :root { --bg: #0f111a; --card: #161926; --green: #00ff88; --red: #ff4444; --text: #e0e0e0; --blue: #00d4ff; --orange: #ff9f1c; --purple: #bd93f9; }
        body { background-color: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 1300px; background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        h2 { text-align: center; color: var(--green); margin-bottom: 25px; font-weight: 700; }
        .table-wrapper { width: 100%; overflow-x: auto; max-height: 65vh; border-radius: 10px; border: 1px solid #2d303e; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 1150px; }
        thead th { position: sticky; top: 0; z-index: 10; background: #1b1e2e; color: var(--blue); padding: 12px 5px; text-align: center; font-size: 0.85rem; border-bottom: 2px solid var(--blue); }
        td { padding: 12px 5px; border-bottom: 1px solid #2d303e; text-align: center; font-size: 0.95rem; }
        .move-btn { cursor: pointer; color: #555; font-size: 1rem; user-select: none; transition: 0.2s; display: inline-block; width: 20px; }
        .move-btn:hover { color: var(--blue); }
        .stock-id { font-weight: bold; color: #fff; display: block; }
        .stock-name { font-size: 0.75rem; color: #888; display: block; }
        input { background: #252836; border: 1px solid #444; color: #fff; padding: 6px; border-radius: 6px; width: 80px; text-align: center; outline: none; }
        .val-text { color: #aaa; font-size: 0.85rem; }
        .btn-group { display: flex; gap: 15px; justify-content: center; margin-bottom: 25px; }
        button { padding: 12px 25px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .btn-fetch { background: linear-gradient(135deg, #007acc, #00d4ff); color: white; }
        .profit { color: var(--green); font-weight: bold; }
        .loss { color: var(--red); font-weight: bold; }
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .summary-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; border: 1px solid #444; text-align: center; }
        .summary-card b { font-size: 1.4rem; display: block; margin-top: 5px; }
        .allocation-box { width: 100%; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 15px; border: 1px solid #333; display: flex; flex-direction: column; align-items: center; }
        .ratio-bar-container { width: 100%; max-width: 900px; height: 35px; background: #222; border-radius: 10px; margin: 15px 0; overflow: hidden; display: flex; border: 1px solid #444; }
        .part { transition: 1s; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; font-size: 0.85rem; overflow: hidden; white-space: nowrap; }
        .stock-part { background: linear-gradient(90deg, #007acc, #00d4ff); }
        .lever-part { background: linear-gradient(90deg, #6272a4, #bd93f9); }
        .bond-part { background: linear-gradient(90deg, #e67e22, #ff9f1c); }
        .pct-bar-bg { width: 100%; height: 6px; background: #222; border-radius: 3px; margin-top: 5px; overflow: hidden; }
        .pct-bar-fill { height: 100%; background: var(--blue); transition: 0.5s; }
    </style>
</head>
<body>
<div class="container">
    <h2>📊 綜合資產戰情室 <small style="font-size: 12px; color:#666;">V21.0 數據精確版</small></h2>
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th style="width: 60px;">排序</th>
                    <th>標的代號</th>
                    <th>持有股數</th>
                    <th>平均成本</th>
                    <th onclick="sortTable('cost')">投資成本 ⇅</th>
                    <th onclick="sortTable('market')">資產市值 ⇅</th>
                    <th onclick="sortTable('price')">最新股價 ⇅</th>
                    <th onclick="sortTable('pl')">損益 ⇅</th>
                    <th onclick="sortTable('roi')">報酬率 ⇅</th>
                    <th onclick="sortTable('dd')">回撤 ⇅</th>
                    <th onclick="sortTable('ytd')">年初至今 ⇅</th>
                    <th onclick="sortTable('ratio')">佔比 ⇅</th>
                </tr>
            </thead>
            <tbody id="list"></tbody>
        </table>
    </div>
    <div class="btn-group"><button class="btn-fetch" onclick="fetchAll()" id="btn-f">🚀 同步即時數據</button></div>
    <div class="summary-grid" id="summary-grid"></div>
    <div class="allocation-box">
        <span style="color: #888;">⚖️ 資產配置：核心、槓桿與避險比例</span>
        <div class="ratio-bar-container">
            <div id="stock-bar" class="part stock-part" style="width: 0%;"></div>
            <div id="lever-bar" class="part lever-part" style="width: 0%;"></div>
            <div id="bond-bar" class="part bond-part" style="width: 0%;"></div>
        </div>
        <div style="font-size: 0.85rem; color: #666; display: flex; gap: 15px;">
            <span><span style="color: var(--blue);">●</span> 股票 (核心)</span>
            <span><span style="color: var(--purple);">●</span> 槓桿 (正2)</span>
            <span><span style="color: var(--orange);">●</span> 債券 (避險)</span>
        </div>
    </div>
</div>
<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwQDoFGzE10nunz5Ib3VqJ86_YX-yYQxzBeEjYg_vg2Y87FQlucug-nsTxb5y3GaFm8Mw/exec";
    const initialStocks = [
        { id: "00662", sym: "00662.TW", name: "富邦NASDAQ", exp: 12 },
        { id: "00670L", sym: "00670L.TW", name: "富邦NASDAQ正2", exp: 20 },
        { id: "00865B", sym: "00865B.TW", name: "國泰美債0-1年", exp: 4 },
        { id: "0050", sym: "0050.TW", name: "元大台灣50", exp: 10 },
        { id: "006208", sym: "006208.TW", name: "富邦台50", exp: 10 },
        { id: "0056", sym: "0056.TW", name: "元大高股息", exp: 7 },
        { id: "00631L", sym: "00631L.TW", name: "元大台灣50正2", exp: 18 },
        { id: "00663L", sym: "00663L.TW", name: "國泰台灣加權正2", exp: 18 },
        { id: "00675L", sym: "00675L.TW", name: "富邦臺灣加權正2", exp: 18 },
        { id: "2330", sym: "2330.TW", name: "台積電", exp: 15 }
    ];
    let displayStocks = JSON.parse(localStorage.getItem('displayStocks')) || initialStocks;
    let currentPrices = {};
    let sortDir = true;

    window.onload = () => { renderTable(); calculate(); };

    function moveRow(index, direction) {
        const newIndex = index + direction;
        if (newIndex < 0 || newIndex >= displayStocks.length) return;
        const temp = displayStocks[index];
        displayStocks[index] = displayStocks[newIndex];
        displayStocks[newIndex] = temp;
        localStorage.setItem('displayStocks', JSON.stringify(displayStocks));
        renderTable();
    }

    function save(id) {
        localStorage.setItem('sh_'+id, document.getElementById('sh_'+id).value);
        localStorage.setItem('co_'+id, document.getElementById('co_'+id).value);
        calculate();
    }

    function renderTable() {
        let html = "";
        displayStocks.forEach((s, index) => {
            const sh = localStorage.getItem('sh_'+s.id) || "", co = localStorage.getItem('co_'+s.id) || "";
            const pD = currentPrices[s.id] || { price: 0 };
            html += `<tr><td><span class="move-btn" onclick="moveRow(${index}, -1)">▲</span><span class="move-btn" onclick="moveRow(${index}, 1)">▼</span></td><td><span class="stock-id">${s.id}</span><span class="stock-name">${s.name}</span></td><td><input type="number" id="sh_${s.id}" value="${sh}" oninput="save('${s.id}')"></td><td><input type="number" id="co_${s.id}" value="${co}" oninput="save('${s.id}')"></td><td id="cost_${s.id}" class="val-text">-</td><td id="mkt_${s.id}" class="val-text">-</td><td>${pD.price || '...'}</td><td id="pl_${s.id}">-</td><td id="roi_${s.id}">-</td><td id="dd_${s.id}">-</td><td id="ytd_${s.id}">-</td><td id="rat_${s.id}">-</td></tr>`;
        });
        document.getElementById('list').innerHTML = html;
        if(Object.keys(currentPrices).length > 0) calculate();
    }

    async function fetchAll() {
        const btn = document.getElementById('btn-f');
        btn.disabled = true;
        for (let s of displayStocks) {
            btn.innerHTML = `抓取 ${s.id}...`;
            try {
                const res = await fetch(`${API_URL}?symbol=${s.sym}&cache=${Date.now()}`);
                const data = await res.json();
                if(data.price) {
                    currentPrices[s.id] = { 
                        price: data.price, 
                        high: data.high, 
                        prevClose: data.prevClose || data.previousClose || data.price,
                        ytdOpen: data.ytdOpen || data.prevClose 
                    };
                }
            } catch (e) { console.error(e); }
        }
        btn.innerHTML = "✅ 同步完成"; calculate();
        setTimeout(() => { btn.innerHTML = "🚀 同步即時數據"; btn.disabled = false; }, 2000);
    }

    function calculate() {
        let tCost = 0, tVal = 0, tDayChange = 0, weightedExp = 0;
        let sVal = 0, lVal = 0, bVal = 0;

        displayStocks.forEach(s => {
            const sh = Number(localStorage.getItem('sh_'+s.id)), co = Number(localStorage.getItem('co_'+s.id)), pr = currentPrices[s.id]?.price || 0, pc = currentPrices[s.id]?.prevClose || 0;
            if (sh > 0 && pr > 0) {
                const mkt = sh * pr; tCost += (sh * co); tVal += mkt;
                if (pc > 0) tDayChange += (pr - pc) * sh;
                // 自動分類邏輯強化
                if (s.id.includes('B')) bVal += mkt;
                else if (s.id.includes('L')) lVal += mkt;
                else sVal += mkt;
            }
        });

        displayStocks.forEach(s => {
            const sh = Number(localStorage.getItem('sh_'+s.id)), co = Number(localStorage.getItem('co_'+s.id)), pr = currentPrices[s.id]?.price || 0;
            const ytdOpen = currentPrices[s.id]?.ytdOpen || pr;
            let hi = currentPrices[s.id]?.high || 0; if (hi > pr * 4) hi = pr;
            const mktValue = sh * pr;
            const rat = tVal > 0 ? (mktValue / tVal * 100).toFixed(1) : 0;
            weightedExp += (mktValue / tVal) * (s.exp || 0);

            if (sh > 0 && pr > 0) {
                const pl = (pr - co) * sh, roi = ((pr - co) / co * 100).toFixed(2), dd = hi > 0 ? ((pr - hi) / hi * 100).toFixed(2) : "0.00", ytdPct = ((pr - ytdOpen) / ytdOpen * 100).toFixed(2);
                document.getElementById('cost_'+s.id).innerText = Math.round(sh * co).toLocaleString();
                document.getElementById('mkt_'+s.id).innerText = Math.round(mktValue).toLocaleString();
                document.getElementById('pl_'+s.id).innerHTML = `<span class="${pl>=0?'profit':'loss'}">${Math.round(pl).toLocaleString()}</span>`;
                document.getElementById('roi_'+s.id).innerHTML = `<span class="${pl>=0?'profit':'loss'}">${roi}%</span>`;
                document.getElementById('dd_'+s.id).innerHTML = `<span style="color:var(--orange)">${dd}%</span>`;
                document.getElementById('ytd_'+s.id).innerHTML = `<span class="${ytdPct>=0?'profit':'loss'}">${ytdPct}%</span>`;
                document.getElementById('rat_'+s.id).innerHTML = `<span style="font-size:0.85rem">${rat}%</span><div class="pct-bar-bg"><div class="pct-bar-fill" style="width:${rat}%"></div></div>`;
            }
        });

        const tPL = tVal - tCost, tROI = tCost > 0 ? (tPL / tCost * 100).toFixed(2) : 0;
        document.getElementById('summary-grid').innerHTML = `
            <div class="summary-card"><span>總市值</span><br><b style="color:var(--blue)">${Math.round(tVal).toLocaleString()}</b></div>
            <div class="summary-card"><span>今日變動</span><br><b style="color:${tDayChange>=0?'var(--green)':'var(--red)'}">${tDayChange>=0?'+':''}${Math.round(tDayChange).toLocaleString()}</b></div>
            <div class="summary-card" style="border:2px solid ${tPL>=0?'var(--green)':'var(--red)'}"><span>累計損益</span><br><b style="color:${tPL>=0?'var(--green)':'var(--red)'}">${tPL>=0?'+':''}${Math.round(tPL).toLocaleString()} (${tROI}%)</b></div>
            <div class="summary-card" style="border:1px solid var(--purple)"><span>年化報酬</span><br><b style="color:var(--purple)">${weightedExp.toFixed(2)}%</b></div>`;

        if (tVal > 0) {
            const sp = (sVal / tVal * 100).toFixed(1), lp = (lVal / tVal * 100).toFixed(1), bp = (bVal / tVal * 100).toFixed(1);
            const sb = document.getElementById('stock-bar'), lb = document.getElementById('lever-bar'), bb = document.getElementById('bond-bar');
            sb.style.width = sp + '%'; sb.innerText = sp > 5 ? `股票 ${sp}%` : '';
            lb.style.width = lp + '%'; lb.innerText = lp > 5 ? `正2 ${lp}%` : '';
            bb.style.width = bp + '%'; bb.innerText = bp > 5 ? `債券 ${bp}%` : '';
        }
    }

    function sortTable(type) {
        sortDir = !sortDir;
        displayStocks.sort((a, b) => {
            let vA = 0, vB = 0;
            const shA = Number(localStorage.getItem('sh_'+a.id)), prA = currentPrices[a.id]?.price || 0, coA = Number(localStorage.getItem('co_'+a.id)), yA = currentPrices[a.id]?.ytdOpen || prA;
            const shB = Number(localStorage.getItem('sh_'+b.id)), prB = currentPrices[b.id]?.price || 0, coB = Number(localStorage.getItem('co_'+b.id)), yB = currentPrices[b.id]?.ytdOpen || prB;
            if(type === 'price') vA = prA, vB = prB;
            else if(type === 'cost') vA = shA * coA, vB = shB * coB;
            else if(type === 'market') vA = shA * prA, vB = shB * prB;
            else if(type === 'pl') vA = (prA - coA) * shA, vB = (prB - coB) * shB;
            else if(type === 'roi') vA = coA > 0 ? (prA - coA) / coA : -99, vB = coB > 0 ? (prB - coB) / coB : -99;
            else if(type === 'ytd') vA = (prA - yA)/yA, vB = (prB - yB)/yB;
            else if(type === 'dd') {
                let hA = (currentPrices[a.id]?.high > prA * 4) ? prA : (currentPrices[a.id]?.high || prA);
                let hB = (currentPrices[b.id]?.high > prB * 4) ? prB : (currentPrices[b.id]?.high || prB);
                vA = (prA - hA) / hA, vB = (prB - hB) / hB;
            }
            else if(type === 'ratio') vA = shA * prA, vB = shB * prB;
            return sortDir ? vA - vB : vB - vA;
        });
        renderTable();
    }
</script>
</body>
</html>
