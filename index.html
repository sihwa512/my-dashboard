<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>綜合資產戰情室 v9 (私人 API 版)</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            text-align: center;
            padding: 20px;
        }
        .dashboard {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            margin-bottom: 25px;
        }
        th, td {
            padding: 12px 5px;
            border-bottom: 1px solid #333;
            text-align: center;
        }
        th {
            color: #00ff88;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .cell-input {
            width: 80px;
            padding: 8px;
            text-align: center;
            background-color: #2a2a2a;
            color: white;
            border: 1px solid #555;
            border-radius: 5px;
        }
        .button-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        button {
            color: #000;
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            font-size: 16px;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-calc { background-color: #00ff88; }
        .btn-calc:hover { background-color: #00cc6a; }
        .btn-fetch { background-color: #00aaff; color: white;}
        .btn-fetch:hover { background-color: #0088cc; }
        .btn-fetch:disabled { background-color: #555; color: #aaa; cursor: not-allowed; }

        .total-panel {
            padding: 20px;
            background: #252525;
            border-radius: 8px;
            font-size: 1.2em;
            line-height: 1.8;
        }
        .profit { color: #00ff88; font-weight: bold; }
        .loss { color: #ff4444; font-weight: bold; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h2>📊 綜合資產戰情室</h2>
        
        <table>
            <thead>
                <tr>
                    <th>標的名稱</th>
                    <th>持有股數</th>
                    <th>平均成本</th>
                    <th>最新股價</th>
                    <th>未實現損益</th>
                </tr>
            </thead>
            <tbody id="stock-list"></tbody>
        </table>

        <div class="button-group">
            <button class="btn-fetch" onclick="fetchPrices()" id="fetch-btn">🚀 啟動私人 API 抓取</button>
            <button class="btn-calc" onclick="calculateAll()">更新整體戰情</button>
        </div>

        <div class="total-panel" id="total-output">
            總投入本金：0 元<br>
            目前總現值：0 元<br>
            總未實現損益：0 元
        </div>
    </div>

    <script>
        // ==========================================
        //
        // ==========================================
        const GOOGLE_API_URL = "https://script.google.com/macros/s/AKfycbx46yc6PFu_WPoHyStlqXSmO_JgBJ8MftdM1p8NnPowM6oJ8WjpiQd7TjqdH1Ezvacq1w/exec";

        const myStocks = [
            { id: "00662", symbol: "00662.TW", name: "富邦NASDAQ" },
            { id: "00670L", symbol: "00670L.TW", name: "富邦NASDAQ正2" },
            { id: "00865B", symbol: "00865B.TW", name: "國泰美債0-1年" },
            { id: "0050", symbol: "0050.TW", name: "元大台灣50" },
            { id: "006208", symbol: "006208.TW", name: "富邦台50" },
            { id: "00631L", symbol: "00631L.TW", name: "元大台灣50正2" },
            { id: "00663L", symbol: "00663L.TW", name: "國泰台灣加權正2" },
            { id: "00675L", symbol: "00675L.TW", name: "富邦臺灣加權正2" },
            { id: "2330", symbol: "2330.TW", name: "台積電" }
        ];

        window.onload = function() {
            let htmlContent = "";
            for (let i = 0; i < myStocks.length; i++) {
                let stock = myStocks[i];
                let savedShares = localStorage.getItem('shares_' + stock.id) || "";
                let savedCost = localStorage.getItem('cost_' + stock.id) || "";

                htmlContent += `
                    <tr>
                        <td>${stock.id} <br> <span style="font-size:12px; color:#aaa;">${stock.name}</span></td>
                        <td><input type="number" id="shares_${stock.id}" class="cell-input" placeholder="股數" value="${savedShares}" oninput="saveData('${stock.id}')"></td>
                        <td><input type="number" id="cost_${stock.id}" class="cell-input" placeholder="成本" value="${savedCost}" oninput="saveData('${stock.id}')"></td>
                        <td><input type="number" id="price_${stock.id}" class="cell-input" placeholder="股價"></td>
                        <td id="pl_${stock.id}">-</td>
                    </tr>
                `;
            }
            document.getElementById('stock-list').innerHTML = htmlContent;
            calculateAll();
        };

        function saveData(stockId) {
            let shares = document.getElementById('shares_' + stockId).value;
            let cost = document.getElementById('cost_' + stockId).value;
            localStorage.setItem('shares_' + stockId, shares);
            localStorage.setItem('cost_' + stockId, cost);
        }

        async function fetchPrices() {
            if(GOOGLE_API_URL.includes("這裡換成你的網址")) {
                alert("請先將程式碼中的 GOOGLE_API_URL 換成您自己的專屬網址！");
                return;
            }

            const btn = document.getElementById('fetch-btn');
            btn.disabled = true; 

            for (let i = 0; i < myStocks.length; i++) {
                let stock = myStocks[i];
                let priceInput = document.getElementById('price_' + stock.id);
                
                btn.innerHTML = `🚀 專屬通道抓取中 (${i + 1}/${myStocks.length})...`;
                priceInput.placeholder = "讀取中...";
                
                try {
                    // 使用你的私人 Google API 加上時間戳記
                    const targetUrl = `${GOOGLE_API_URL}?symbol=${stock.symbol}&_nocache=${new Date().getTime()}`;
                    
                    const response = await fetch(targetUrl);
                    if (!response.ok) throw new Error('網路回應錯誤');
                    
                    const data = await response.json();
                    const currentPrice = data.chart.result[0].meta.regularMarketPrice;
                    
                    priceInput.value = currentPrice;

                } catch (error) {
                    console.error(`無法抓取 ${stock.id} 的股價`, error);
                    priceInput.placeholder = "請手動輸入";
                }
            }

            btn.innerHTML = "✅ 戰情更新完成";
            calculateAll(); 
            
            setTimeout(() => {
                btn.innerHTML = "🚀 啟動私人 API 抓取";
                btn.disabled = false;
            }, 3000);
        }

        function calculateAll() {
            let totalCostAll = 0;
            let totalValueAll = 0;

            for (let i = 0; i < myStocks.length; i++) {
                let stock = myStocks[i];
                let shares = Number(document.getElementById('shares_' + stock.id).value);
                let cost = Number(document.getElementById('cost_' + stock.id).value);
                let price = Number(document.getElementById('price_' + stock.id).value);

                if (shares > 0 && price > 0) {
                    let totalCost = shares * cost; 
                    let currentValue = shares * price; 
                    let profitLoss = currentValue - totalCost; 

                    totalCostAll += totalCost;
                    totalValueAll += currentValue;

                    let plElement = document.getElementById('pl_' + stock.id);
                    if (profitLoss > 0) {
                        plElement.innerHTML = `<span class="profit">+${profitLoss.toLocaleString()}</span>`;
                    } else if (profitLoss < 0) {
                        plElement.innerHTML = `<span class="loss">${profitLoss.toLocaleString()}</span>`;
                    } else {
                        plElement.innerHTML = `<span>${profitLoss}</span>`;
                    }
                }
            }

            let totalPL = totalValueAll - totalCostAll;
            let colorClass = totalPL >= 0 ? "profit" : "loss";
            let sign = totalPL > 0 ? "+" : "";

            document.getElementById('total-output').innerHTML = `
                總投入本金：<strong>${totalCostAll.toLocaleString()}</strong> 元<br>
                目前總現值：<strong>${totalValueAll.toLocaleString()}</strong> 元<br>
                總未實現損益：<span class="${colorClass}">${sign}${totalPL.toLocaleString()}</span> 元
            `;
        }
    </script>
</body>
</html>
