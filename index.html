<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>退休資產戰情室 V36.0</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0f111a; --card: #161926; --green: #00ff88; --red: #ff4444; --text: #e0e0e0; --blue: #00d4ff; --orange: #ff9f1c; --purple: #bd93f9; --slate: #6272a4; }
        body { background-color: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 12px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 1300px; background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); border: 1px solid #333; box-sizing: border-box; overflow: hidden; }
        
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; width: 100%; }
        h2 { margin: 0; color: var(--green); font-weight: 700; font-size: 1.6rem; white-space: nowrap; display: flex; align-items: center; gap: 8px; }
        .header-actions { display: flex; gap: 8px; }
        .icon-btn { cursor: pointer; font-size: 1.2rem; background: #2d303e; padding: 8px 14px; border-radius: 12px; border: 1px solid #555; transition: 0.2s; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
        .icon-btn:active { background: #444; transform: scale(0.9); }

        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .summary-card { background: linear-gradient(145deg, #1b1e2e, #161926); padding: 15px; border-radius: 15px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .summary-card span { font-size: 0.8rem; color: #888; letter-spacing: 1px; }
        .summary-card b { font-size: 1.4rem; display: block; margin-top: 8px; font-family: 'Consolas', monospace; }
        
        .chart-container { width: 100%; height: 260px; background: rgba(0,0,0,0.2); border-radius: 15px; border: 1px solid var(--purple); box-shadow: 0 0 15px rgba(189, 147, 249, 0.05); padding: 15px; margin-bottom: 20px; box-sizing: border-box; display: flex; flex-direction: column; }
        .chart-header { color: var(--purple); font-weight: bold; font-size: 0.95rem; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
        .canvas-wrapper { flex: 1; position: relative; width: 100%; }

        .table-header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; width: 100%; padding: 0 5px; box-sizing: border-box; }
        .table-title { color: var(--blue); font-weight: bold; font-size: 0.95rem; }
        .btn-edit-pool { background: transparent; border: 1px solid var(--orange); color: var(--orange); padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: bold; transition: 0.3s; display: flex; align-items: center; gap: 5px; }
        .btn-edit-pool.active { background: var(--orange); color: #000; box-shadow: 0 0 10px rgba(255, 159, 28, 0.4); }

        .add-stock-bar { display: none; align-items: center; gap: 10px; background: #1b1e2e; padding: 12px; border-radius: 12px; border: 1px dashed var(--orange); margin-bottom: 15px; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        .add-input { background: #252836; border: 1px solid #555; color: #fff; padding: 8px 12px; border-radius: 8px; width: 120px; font-size: 1rem; text-transform: uppercase; outline: none; box-sizing: border-box; }
        .add-input:focus { border-color: var(--orange); }
        .btn-add { background: var(--orange); color: #000; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        .btn-add:active { transform: scale(0.95); }
        .btn-del { cursor: pointer; color: var(--red); font-size: 1rem; margin-right: 5px; background: rgba(255,68,68,0.1); border-radius: 4px; padding: 2px 5px; user-select: none; }

        .table-wrapper { width: 100%; overflow-x: auto; border-radius: 12px; border: 1px solid var(--slate); box-shadow: 0 0 15px rgba(98, 114, 164, 0.1); margin-bottom: 20px; background: #1b1e2e; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        thead th { position: sticky; top: 0; background: #252836; color: var(--blue); padding: 15px 5px; text-align: center; font-size: 0.85rem; border-bottom: 2px solid var(--slate); cursor: pointer; }
        td { padding: 14px 5px; border-bottom: 1px solid #2d303e; text-align: center; font-size: 0.95rem; transition: color 0.3s, text-shadow 0.3s; }
        
        /* 閃爍更新特效 */
        @keyframes flashUpdate {
            0% { color: #ffffff; text-shadow: 0 0 10px #ffffff; transform: scale(1.05); }
            100% { color: var(--blue); text-shadow: none; transform: scale(1); }
        }
        .data-flash { display: inline-block; animation: flashUpdate 1s ease-out; }

        input[type="number"] { box-sizing: border-box; background: #252836; border: 1px solid #555; color: #fff; padding: 8px; border-radius: 8px; width: 90px; text-align: center; font-size: 1rem; outline: none; }
        input[type="number"]:focus { border-color: var(--orange); }
        .input-readonly { background: #1a1c23; color: #777; border: 1px solid #333; cursor: not-allowed; }
        .privacy-mask { filter: blur(12px); opacity: 0.15; pointer-events: none; transition: 0.3s; }
        .empty-state { color: #888; padding: 30px !important; font-size: 0.9rem; letter-spacing: 0.5px; }
        
        .target-inputs-wrapper { display: flex; gap: 15px; margin: 15px 0; width: 100%; box-sizing: border-box; }
        
        .ratio-bar-container { width: 100%; height: 45px; background: #111; border-radius: 12px; margin: 15px 0; overflow: hidden; display: flex; border: 2px solid #333; }
        .part { height: 100%; transition: 1.2s cubic-bezier(0.18, 0.89, 0.32, 1.28); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 0.85rem; font-weight: bold; white-space: nowrap; overflow: hidden; }
        .stock-part { background: linear-gradient(90deg, #007acc, #00d4ff); }
        .lever-part { background: linear-gradient(90deg, #6272a4, #bd93f9); border-left: 1px solid rgba(0,0,0,0.5); border-right: 1px solid rgba(0,0,0,0.5); }
        .bond-part { background: linear-gradient(90deg, #e67e22, #ff9f1c); }

        .btn-fetch { background: linear-gradient(135deg, #007acc, #00d4ff); color: white; padding: 18px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 25px; font-size: 1.2rem; box-shadow: 0 6px 20px rgba(0, 122, 204, 0.4); transition: 0.3s; }
        .btn-fetch:active { transform: translateY(2px); box-shadow: none; }
        .withdraw-input { width: 65px !important; background: #1b1e2e; border: 2px solid var(--blue); color: var(--blue); padding: 5px; border-radius: 8px; font-weight: bold; text-align: center; }

        @media (max-width: 768px) {
            .container { padding: 12px; border-radius: 0; }
            .header-container { flex-direction: column; gap: 12px; align-items: center; margin-bottom: 20px; }
            h2 { font-size: 1.4rem; white-space: normal; text-align: center; }
            .header-actions { justify-content: center; width: 100%; }
            .icon-btn { font-size: 1.2rem; padding: 8px 15px; }
            
            .summary-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
            .summary-grid > div:first-child { grid-column: span 2; }
            .summary-card { padding: 12px; }
            .summary-card b { font-size: 1.2rem; }
            
            .chart-container { height: 200px; padding: 10px; margin-bottom: 15px; }
            .chart-header { font-size: 0.85rem; margin-bottom: 5px; }
            
            .target-inputs-wrapper { gap: 8px !important; }
            input[type="number"] { padding: 8px 4px; font-size: 0.95rem; }
            
            .add-stock-bar { flex-direction: column; align-items: stretch; }
            .add-input { width: 100%; }
            
            .ratio-bar-container { height: 35px; }
            .part { font-size: 0.65rem; letter-spacing: -0.5px; }
            .btn-fetch { padding: 15px; font-size: 1.1rem; margin-bottom: 15px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header-container">
        <h2>📊 綜合退休戰情室 V36.0</h2>
        <div class="header-actions">
            <span class="icon-btn" onclick="exportData()" title="備份資料">💾</span>
            <label class="icon-btn" title="還原資料" style="margin: 0;">
                📂<input type="file" id="import-file" accept=".json" style="display:none;" onchange="importData(event)">
            </label>
            <span id="eye-icon" class="icon-btn" onclick="togglePrivacy()" title="隱私模式">👁️</span>
        </div>
    </div>
    
    <div id="summary-grid" class="summary-grid">
        <div class="summary-card" style="border: 1px solid var(--slate);">
            <span>💵 USD/TWD 匯率</span><br><b id="usd-twd-val" style="color:var(--orange)">加載中...</b>
        </div>
        <div class="summary-card" style="border: 1px solid var(--blue);">
            <span>資產總市值</span><br><b id="sum-val" style="color:var(--blue)">-</b>
        </div>
        <div class="summary-card" id="sum-change-card">
            <span>今日損益跳動</span><br><b id="sum-change">-</b>
        </div>
        <div class="summary-card" id="sum-pl-card">
            <span>累積總損益</span><br><b id="sum-pl">-</b>
        </div>
        <div class="summary-card" style="border: 1px solid var(--orange);">
            <span>風險溫度(總回撤)</span><br><b id="sum-dd" style="color:var(--red)">-</b>
        </div>
    </div>

    <div id="chart-wrapper" class="chart-container">
        <div class="chart-header">📈 歷史淨值曲線圖</div>
        <div class="canvas-wrapper">
            <canvas id="historyChart"></canvas>
        </div>
    </div>

    <div class="table-header-bar">
        <span class="table-title">📋 當前資產部位</span>
        <button id="edit-pool-btn" class="btn-edit-pool" onclick="toggleEditMode()">⚙️ 管理股票池</button>
    </div>

    <div id="add-stock-bar" class="add-stock-bar">
        <span style="color:var(--orange); font-weight:bold; font-size:0.9rem;">➕ 新增自選標的：</span>
        <input type="text" id="new-stock-id" class="add-input" placeholder="輸入代號 (例: 00878)" onkeypress="if(event.key === 'Enter') addNewStock()">
        <button class="btn-add" onclick="addNewStock()">新增入池</button>
        <span style="font-size:0.75rem; color:#888;">*若為台股會自動補上 .TW</span>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th onclick="sortTable('id')">標的 ⇅</th>
                    <th>持有股數</th>
                    <th>平均成本</th>
                    <th onclick="sortTable('market')">目前市值 ⇅</th>
                    <th>最新股價 <br><small style="color:#888; font-weight:normal;">(含昨收比對)</small></th>
                    <th onclick="sortTable('roi')">報酬率 ⇅</th>
                    <th>回撤</th>
                    <th>YTD</th>
                    <th onclick="sortTable('ratio')">佔比 ⇅</th>
                    <th>再平衡建議</th>
                </tr>
            </thead>
            <tbody id="list"></tbody>
        </table>
    </div>

    <button class="btn-fetch" onclick="fetchAll()" id="btn-f">🚀 同步資產數據</button>

    <div class="summary-grid" style="grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));">
        <div class="summary-card" style="text-align: left; border: 1px solid var(--blue); box-shadow: 0 0 15px rgba(0, 212, 255, 0.05);">
            <span style="color:var(--blue); font-weight:bold;">⚖️ 目標再平衡 (Target %)</span>
            <div class="target-inputs-wrapper">
                <div style="flex:1;"><small>股票</small><br><input type="number" id="target-s" value="40" style="width:100%" oninput="updateTargets()"></div>
                <div style="flex:1;"><small>正2</small><br><input type="number" id="target-l" value="30" style="width:100%" oninput="updateTargets()"></div>
                <div style="flex:1;"><small>債券</small><br><input type="number" id="target-b" value="30" style="width:100%" class="input-readonly" readonly></div>
            </div>
            <div class="ratio-bar-container">
                <div id="stock-bar" class="part stock-part"></div>
                <div id="lever-bar" class="part lever-part"></div>
                <div id="bond-bar" class="part bond-part"></div>
            </div>
        </div>
        
        <div class="summary-card" style="text-align: left; border: 1px solid var(--green); box-shadow: 0 0 15px rgba(0, 255, 136, 0.05);">
            <span style="color:var(--green); font-weight:bold;">📈 提領模擬 | 提領率：<input type="number" id="swr-rate" value="4" step="0.1" class="withdraw-input" oninput="updateSwr()" style="border-color:var(--green); color:var(--green);">%</span>
            <div style="display: flex; gap: 30px; margin-top: 20px;">
                <div style="flex:1;"><span>預估年領取額</span><br><b id="annual-withdraw" style="color:var(--green);">-</b></div>
                <div style="flex:1;"><span>預估月領取額</span><br><b id="monthly-withdraw" style="color:var(--blue);">-</b></div>
            </div>
        </div>
    </div>
</div>

<script>
    // 您建立的全新 Yahoo Finance 獨立引擎 API
    const API_URL = "https://script.google.com/macros/s/AKfycbzIOppgygYd3sWBSjJoOwEZFjiSZ-nAgneD7sqALdItKarLxv9DobEoO_3k35tVmu4EHA/exec";
    
    const initialStocks = [
        { id: "00662", sym: "00662.TW" }, { id: "00670L", sym: "00670L.TW" }, { id: "00865B", sym: "00865B.TW" },
        { id: "0050", sym: "0050.TW" }, { id: "006208", sym: "006208.TW" }, { id: "0056", sym: "0056.TW" },
        { id: "00631L", sym: "00631L.TW" }, { id: "00663L", sym: "00663L.TW" }, { id: "00675L", sym: "00675L.TW" },
        { id: "2330", sym: "2330.TW" }
    ];
    
    let displayStocks = initialStocks;
    try {
        let stored = localStorage.getItem('displayStocks_v28');
        if (stored && stored !== "undefined") {
            displayStocks = JSON.parse(stored);
            if (!Array.isArray(displayStocks) || displayStocks.length === 0) displayStocks = initialStocks;
        }
    } catch (e) { localStorage.setItem('displayStocks_v28', JSON.stringify(initialStocks)); }

    let currentPrices = {};
    let isPrivate = localStorage.getItem('privacy_v28') === 'true';
    let equityChart = null;
    let isEditMode = false; 

    window.onload = () => { 
        try {
            let savedS = localStorage.getItem('target_s');
            if(savedS !== null) document.getElementById('target-s').value = savedS;
            let savedL = localStorage.getItem('target_l');
            if(savedL !== null) document.getElementById('target-l').value = savedL;
            let savedSwr = localStorage.getItem('swr_rate');
            if(savedSwr !== null) document.getElementById('swr-rate').value = savedSwr;

            updateTargets(); 
            updateEyeUI(); 
            renderTable(); 
            fetchUSD(); 
        } catch(e) { console.error(e); }
    };

    function exportData() {
        let backupData = {};
        for(let i=0; i<localStorage.length; i++) {
            let key = localStorage.key(i);
            backupData[key] = localStorage.getItem(key);
        }
        let dataStr = JSON.stringify(backupData);
        let blob = new Blob([dataStr], { type: "application/json" });
        let url = URL.createObjectURL(blob);
        let a = document.createElement('a');
        a.href = url;
        let date = new Date().toISOString().split('T')[0];
        a.download = `退休戰情室備份_${date}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function importData(event) {
        let file = event.target.files[0];
        if(!file) return;
        let reader = new FileReader();
        reader.onload = function(e) {
            try {
                let importedData = JSON.parse(e.target.result);
                localStorage.clear();
                for(let key in importedData) { localStorage.setItem(key, importedData[key]); }
                alert("✅ 資料還原成功！系統將為您重新載入畫面。");
                location.reload(); 
            } catch(err) { alert("❌ 還原失敗：檔案格式不正確。"); }
        };
        reader.readAsText(file);
        event.target.value = '';
    }

    function togglePrivacy() { isPrivate = !isPrivate; localStorage.setItem('privacy_v28', isPrivate); updateEyeUI(); calculate(); }
    function updateEyeUI() { document.getElementById('eye-icon').innerText = isPrivate ? '🙈' : '👁️'; document.getElementById('chart-wrapper').className = isPrivate ? 'chart-container privacy-mask' : 'chart-container'; }
    
    function toggleEditMode() {
        isEditMode = !isEditMode;
        const btn = document.getElementById('edit-pool-btn');
        const addBar = document.getElementById('add-stock-bar');
        if (isEditMode) {
            btn.innerHTML = "✅ 完成編輯";
            btn.classList.add('active');
            addBar.style.display = "flex"; 
        } else {
            btn.innerHTML = "⚙️ 管理股票池";
            btn.classList.remove('active');
            addBar.style.display = "none"; 
        }
        renderTable();
        calculate(); 
    }

    function addNewStock() {
        let val = document.getElementById('new-stock-id').value.trim().toUpperCase();
        if(!val) return;
        if(displayStocks.find(s => s.id === val)) { alert("這個標的已經在股票池中囉！"); return; }
        let sym = val;
        if (!val.includes('.')) sym = val + ".TW";

        displayStocks.push({id: val, sym: sym});
        localStorage.setItem('displayStocks_v28', JSON.stringify(displayStocks));
        
        document.getElementById('new-stock-id').value = '';
        renderTable();
        
        fetch(`${API_URL}?symbol=${sym}&cache=${Date.now()}`)
            .then(res => res.json())
            .then(data => { if(data.price) currentPrices[val] = data; calculate(); })
            .catch(e => console.log("抓取失敗", e));
    }

    function deleteStock(id) {
        if(!confirm(`確定刪除標的「${id}」嗎？\n(將清除該標的股數與成本)`)) return;
        displayStocks = displayStocks.filter(s => s.id !== id);
        localStorage.setItem('displayStocks_v28', JSON.stringify(displayStocks));
        localStorage.removeItem('sh_'+id);
        localStorage.removeItem('co_'+id);
        renderTable();
        calculate();
    }

    function updateTargets() { 
        let s = Number(document.getElementById('target-s').value) || 0; 
        let l = Number(document.getElementById('target-l').value) || 0; 
        document.getElementById('target-b').value = (100 - s - l).toFixed(0); 
        localStorage.setItem('target_s', s);
        localStorage.setItem('target_l', l);
        calculate(); 
    }

    function updateSwr() {
        let swr = document.getElementById('swr-rate').value;
        localStorage.setItem('swr_rate', swr);
        calculate();
    }
    
    function save(id) { 
        localStorage.setItem('sh_'+id, document.getElementById('sh_'+id).value); 
        localStorage.setItem('co_'+id, document.getElementById('co_'+id).value); 
        calculate(); 
    }
    
    function renderTable() {
        let html = "";
        let holdingCount = 0;

        displayStocks.forEach(s => {
            const sh = localStorage.getItem('sh_'+s.id) || "0", co = localStorage.getItem('co_'+s.id) || "0";
            if (!isEditMode && (Number(sh) === 0 || sh === "")) return;
            holdingCount++;
            
            let idDisplay = isEditMode ? `<div style="display:flex; align-items:center; justify-content:center;"><span class="btn-del" onclick="deleteStock('${s.id}')" title="刪除標的">✖</span><b style="color:#fff">${s.id}</b></div>` : `<b style="color:#fff">${s.id}</b>`;
            
            html += `<tr><td>${idDisplay}</td><td><input type="number" id="sh_${s.id}" value="${sh}" oninput="save('${s.id}')"></td><td><input type="number" id="co_${s.id}" value="${co}" oninput="save('${s.id}')"></td><td id="mkt_${s.id}">-</td><td id="price_${s.id}" style="color:var(--blue)">-</td><td id="roi_${s.id}">-</td><td id="dd_${s.id}">-</td><td id="ytd_${s.id}">-</td><td id="rat_${s.id}">-</td><td id="reb_${s.id}">-</td></tr>`;
        });

        if (holdingCount === 0 && !isEditMode) {
            html = `<tr><td colspan="10" class="empty-state">📦 庫存空空如也，請點擊右上方「⚙️ 管理股票池」開始買進建倉。</td></tr>`;
        }
        document.getElementById('list').innerHTML = html;
    }

    async function fetchUSD() {
        try {
            const res = await fetch(`${API_URL}?symbol=TWD=X&cache=${Date.now()}`);
            const data = await res.json();
            if(data.price) {
                let diff = data.price - (data.prevClose || data.price);
                let color = diff >= 0 ? 'var(--red)' : 'var(--green)'; 
                let sign = diff >= 0 ? '+' : '';
                document.getElementById('usd-twd-val').innerHTML = `${data.price.toFixed(3)} <span style="font-size:0.85rem; color:${color}">(${sign}${diff.toFixed(3)})</span>`;
            }
        } catch (e) { document.getElementById('usd-twd-val').innerText = "暫無數據"; }
    }

    async function fetchAll() {
        const btn = document.getElementById('btn-f');
        btn.disabled = true; btn.innerHTML = "📡 同步中，請稍候...";
        fetchUSD(); 
        for (let s of displayStocks) {
            try {
                const res = await fetch(`${API_URL}?symbol=${s.sym}&cache=${Date.now()}`);
                const data = await res.json();
                if(data.price) currentPrices[s.id] = data;
            } catch (e) {}
        }
        btn.innerHTML = "✅ 同步完成";
        setTimeout(() => btn.innerHTML = "🚀 同步資產數據", 2000);
        calculate(true); 
    }

    function drawChart(historyData) {
        if (typeof Chart === 'undefined') { document.getElementById('chart-wrapper').style.display = 'none'; return; }
        const ctx = document.getElementById('historyChart').getContext('2d');
        const labels = Object.keys(historyData).sort(); 
        const data = labels.map(k => historyData[k]); 
        const shortLabels = labels.map(date => date.substring(5)); 

        if (equityChart) equityChart.destroy(); 
        equityChart = new Chart(ctx, {
            type: 'line',
            data: { labels: shortLabels, datasets: [{ label: '總市值', data: data, borderColor: '#bd93f9', backgroundColor: 'rgba(189, 147, 249, 0.1)', borderWidth: 2, fill: true, tension: 0.3, pointRadius: 4, pointHoverRadius: 6 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#888' } }, y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#888' } } } }
        });
    }

    function calculate(isFreshFetch = false) {
        let tVal = 0, tCost = 0, tDayChange = 0, tDrawdown = 0;
        let sVal = 0, lVal = 0, bVal = 0;
        const swrRate = (Number(document.getElementById('swr-rate').value) || 4) / 100;
        const ts = Number(document.getElementById('target-s').value)/100, tl = Number(document.getElementById('target-l').value)/100, tb = (100 - (ts*100) - (tl*100))/100;

        displayStocks.forEach(s => {
            const sh = Number(localStorage.getItem('sh_'+s.id)) || 0, p = currentPrices[s.id];
            if (sh > 0 && p && p.price > 0) {
                const m = sh * p.price; tVal += m;
                if (s.id.includes('B')) bVal += m; else if (s.id.includes('L')) lVal += m; else sVal += m;
            }
        });

        displayStocks.forEach(s => {
            const sh = Number(localStorage.getItem('sh_'+s.id)) || 0, co = Number(localStorage.getItem('co_'+s.id)) || 0, p = currentPrices[s.id];
            const mktEl = document.getElementById('mkt_'+s.id);
            
            if (sh > 0 && p && p.price > 0 && mktEl) {
                const m = sh * p.price; tCost += (sh * co);
                
                // 這裡取得的 prevClose 現在絕對精準，因為直接來自 Yahoo Finance！
                let pcRaw = p.prevClose !== undefined ? p.prevClose : '無資料';
                let pc = parseFloat(p.prevClose);
                if (isNaN(pc) || pc === 0) pc = p.price; 
                
                tDayChange += (p.price - pc) * sh;
                
                const roi = ((p.price - co) / co * 100).toFixed(2);
                const rat = (m / tVal * 100).toFixed(1);
                let highMark = parseFloat(p.high) || p.price;
                const ddValue = highMark > 0 ? ((p.price - highMark) / highMark * 100).toFixed(2) : "0.00";
                tDrawdown += (m / tVal) * parseFloat(ddValue);
                let reb = s.id.includes('B') ? (tVal*tb-bVal)*(m/bVal||1) : (s.id.includes('L') ? (tVal*tl-lVal)*(m/lVal||1) : (tVal*ts-sVal)*(m/sVal||1));

                mktEl.innerText = Math.round(m).toLocaleString();
                mktEl.className = isPrivate ? 'privacy-mask' : '';
                
                const priceEl = document.getElementById('price_'+s.id);
                priceEl.innerHTML = `<span style="font-size:1.05rem;" class="${isFreshFetch ? 'data-flash' : ''}">${p.price}</span><br><span style="font-size:0.75rem; color:#888;">昨收: ${pcRaw}</span>`;
                
                document.getElementById('roi_'+s.id).innerHTML = `<span style="color:${p.price>=co?'var(--green)':'var(--red)'}">${roi}%</span>`;
                document.getElementById('dd_'+s.id).innerText = ddValue + "%";
                
                // YTD欄位若後台未提供，以 "-" 顯示，保持版面乾淨
                let ytdDisplay = p.ytdOpen > 0 ? ((p.price-p.ytdOpen)/p.ytdOpen*100).toFixed(2)+"%" : "-";
                let ytdColor = p.ytdOpen > 0 ? (p.price>=p.ytdOpen?'var(--green)':'var(--red)') : '#888';
                document.getElementById('ytd_'+s.id).innerHTML = `<span style="color:${ytdColor}">${ytdDisplay}</span>`;
                
                document.getElementById('rat_'+s.id).innerText = rat + "%";
                
                const rEl = document.getElementById('reb_'+s.id);
                rEl.innerHTML = `<span style="color:${reb>=0?'var(--green)':'var(--red)'}; font-size:0.85rem;">${reb>=0?'加碼':'減碼'}<br>${Math.abs(Math.round(reb)).toLocaleString()}</span>`;
                rEl.className = isPrivate ? 'privacy-mask' : '';
            } else if (p && p.price > 0 && mktEl) {
                let pcRaw = p.prevClose !== undefined ? p.prevClose : '無資料';
                const priceEl = document.getElementById('price_'+s.id);
                priceEl.innerHTML = `<span style="font-size:1.05rem;" class="${isFreshFetch ? 'data-flash' : ''}">${p.price}</span><br><span style="font-size:0.75rem; color:#888;">昨收: ${pcRaw}</span>`;
            }
        });

        const pl = tVal - tCost, pPct = tCost > 0 ? (pl / tCost * 100).toFixed(2) : 0;
        
        document.getElementById('sum-val').innerText = Math.round(tVal).toLocaleString();
        document.getElementById('sum-val').className = isPrivate ? 'privacy-mask' : '';
        document.getElementById('sum-change').innerHTML = `<span style="color:${tDayChange>=0?'var(--green)':'var(--red)'}">${tDayChange>=0?'+':''}${Math.round(tDayChange).toLocaleString()}</span>`;
        document.getElementById('sum-change').className = isPrivate ? 'privacy-mask' : '';
        document.getElementById('sum-change-card').style.border = `1px solid ${tDayChange>=0?'var(--green)':'var(--red)'}`;
        document.getElementById('sum-pl').innerHTML = `<span style="color:${pl>=0?'var(--green)':'var(--red)'}">${Math.round(pl).toLocaleString()} (${pPct}%)</span>`;
        document.getElementById('sum-pl').className = isPrivate ? 'privacy-mask' : '';
        document.getElementById('sum-pl-card').style.border = `1px solid ${pl>=0?'var(--green)':'var(--red)'}`;
        document.getElementById('sum-dd').innerText = tDrawdown.toFixed(2) + "%";

        const ann = tVal * swrRate;
        document.getElementById('annual-withdraw').innerText = "NT$ " + Math.round(ann).toLocaleString();
        document.getElementById('monthly-withdraw').innerText = "NT$ " + Math.round(ann/12).toLocaleString();
        document.getElementById('annual-withdraw').className = isPrivate ? 'privacy-mask' : '';
        document.getElementById('monthly-withdraw').className = isPrivate ? 'privacy-mask' : '';

        if (tVal > 0) {
            const sp = (sVal/tVal*100).toFixed(1), lp = (lVal/tVal*100).toFixed(1), bp = (bVal/tVal*100).toFixed(1);
            const sb = document.getElementById('stock-bar'), lb = document.getElementById('lever-bar'), bb = document.getElementById('bond-bar');
            sb.style.width = sp+'%'; sb.innerText = `股票 ${sp}%`;
            lb.style.width = lp+'%'; lb.innerText = `正2 ${lp}%`;
            bb.style.width = bp+'%'; bb.innerText = `債券 ${bp}%`;
        }

        if (tVal > 0) {
            try {
                let todayDate = new Date().toISOString().split('T')[0]; 
                let historyData = {};
                let hStored = localStorage.getItem('equityHistory');
                if (hStored && hStored !== "undefined") historyData = JSON.parse(hStored);

                if (Object.keys(historyData).length === 0) {
                    let yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
                    historyData[yesterday] = Math.round(tVal - tDayChange);
                }
                historyData[todayDate] = Math.round(tVal);
                let keys = Object.keys(historyData).sort();
                if (keys.length > 30) delete historyData[keys[0]];
                localStorage.setItem('equityHistory', JSON.stringify(historyData));
                drawChart(historyData);
            } catch(e) {
                localStorage.removeItem('equityHistory');
            }
        }
    }

    function sortTable(type) { displayStocks.sort((a, b) => { const getV = (s) => { const sh = Number(localStorage.getItem('sh_'+s.id))||0; const p = currentPrices[s.id]?.price||0; if(type==='market') return sh*p; return s.id; }; return getV(b) > getV(a) ? 1 : -1; }); renderTable(); calculate(); }
</script>
</body>
