<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>綜合資產戰情室 V11</title>
    <style>
        :root { --bg: #0f111a; --card: #1a1c27; --green: #00ff88; --red: #ff4444; --orange: #ffa500; --text: #e0e0e0; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 1200px; margin: 0 auto; background: var(--card); padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        h2 { margin-bottom: 25px; letter-spacing: 2px; color: var(--green); }
        
        /* 表格響應式 */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; min-width: 800px; }
        th, td { padding: 15px 8px; border-bottom: 1px solid #2d303e; text-align: center; }
        th { color: var(--green); font-size: 0.9rem; text-transform: uppercase; }
        
        .stock-id { font-weight: bold; font-size: 1.1rem; }
        .stock-name { font-size: 11px; color: #888; display: block; }
        
        input { background: #252836; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 6px; width: 85px; text-align: center; transition: 0.3s; }
        input:focus { border-color: var(--green); outline: none; box-shadow: 0 0 5px rgba(0,255,136,0.3); }

        .btn-group { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        button { padding: 12px 25px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 15px; }
        .btn-fetch { background: #007acc; color: white; }
        .btn-fetch:hover { background: #005f9e; }
        .btn-calc { background: var(--green); color: #000; }
        .btn-calc:hover { background: #00cc6a; }
        
        .profit { color: var(--green); font-weight: bold; }
        .loss { color: var(--red); font-weight: bold; }
        .dd-val { color: var(--orange); font-weight: bold; }

        .summary { background: #222533; padding: 20px; border-radius: 10px; border: 1px solid #333; line-height: 2; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 綜合資產戰情室 <small style="font-size: 12px; color:#666;">V11.0 穩定版</small></h2>
    
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>標的</th>
                    <th>持有股數</th>
                    <th>平均成本</th>
                    <th>最新股價</th>
                    <th>未實現損益</th>
                    <th>報酬率</th>
                    <th>52W高點</th>
                    <th>高點回撤</th>
                </tr>
            </thead>
            <tbody id="list"></tbody>
        </table>
    </div>

    <div class="btn-group">
        <button class="btn-fetch" onclick="fetchAll()" id="btn-f">🚀 同步即時數據</button>
        <button class="btn-calc" onclick="calculate()">⚖️ 更新戰情統計</button>
    </div>

    <div class="summary" id="summary">
        請先輸入股數與成本，並點擊同步按鈕。
    </div>
</div>

<script>
    // ★★★ 請確認這行已經換成你自己的 API 網址 ★★★
    const API_URL = "https://https://script.google.com/macros/s/AKfycbwQDoFGzE10nunz5Ib3VqJ86_YX-yYQxzBeEjYg_vg2Y87FQlucug-nsTxb5y3GaFm8Mw/exec";

    const stocks = [
        { id: "00662", sym: "00662.TW", name: "富邦NASDAQ" },
        { id: "00670L", sym: "00670L.TW", name: "富邦NASDAQ正2" },
        { id: "00865B", sym: "00865B.TW", name: "國泰美債0-1年" },
        { id: "0050", sym: "0050.TW", name: "元大台灣50" },
        { id: "006208", sym: "006208.TW", name: "富邦台50" },
        { id: "00631L", sym: "00631L.TW", name: "元大台灣50正2" },
        { id: "00663L", sym: "00663L.TW", name: "國泰台灣加權正2" },
        { id: "00675L", sym: "00675L.TW", name: "富邦臺灣加權正2" },
        { id: "2330", sym: "2330.TW", name: "台積電" }
    ];

    window.onload = () => {
        let html = "";
        stocks.forEach(s => {
            const sh = localStorage.getItem('sh_'+s.id) || "";
            const co = localStorage.getItem('co_'+s.id) || "";
            html += `<tr>
                <td><span class="stock-id">${s.id}</span><span class="stock-name">${s.name}</span></td>
                <td><input type="number" id="sh_${s.id}" value="${sh}" oninput="save('${s.id}')"></td>
                <td><input type="number" id="co_${s.id}" value="${co}" oninput="save('${s.id}')"></td>
                <td><input type="number" id="pr_${s.id}" placeholder="..."></td>
                <td id="pl_${s.id}">-</td>
                <td id="roi_${s.id}">-</td>
                <td id="hi_${s.id}" style="color:#777">-</td>
                <td id="dd_${s.id}">-</td>
            </tr>`;
        });
        document.getElementById('list').innerHTML = html;
        calculate();
    };

    function save(id) {
        localStorage.setItem('sh_'+id, document.getElementById('sh_'+id).value);
        localStorage.setItem('co_'+id, document.getElementById('co_'+id).value);
    }

    async function fetchAll() {
        const btn = document.getElementById('btn-f');
        btn.disabled = true;
        for (let i = 0; i < stocks.length; i++) {
            const s = stocks[i];
            btn.innerHTML = `正在抓取 ${s.id}...`;
            try {
                const res = await fetch(`${API_URL}?symbol=${s.sym}&cache=${Date.now()}`);
                const data = await res.json();
                if(data.price) {
                    document.getElementById('pr_'+s.id).value = data.price;
                    document.getElementById('hi_'+s.id).innerText = data.high;
                    const dd = ((data.price - data.high) / data.high * 100).toFixed(2);
                    document.getElementById('dd_'+s.id).innerHTML = `<span class="dd-val">${dd}%</span>`;
                }
            } catch (e) { console.error(e); }
        }
        btn.innerHTML = "✅ 資料同步完成";
        calculate();
        setTimeout(() => { btn.innerHTML = "🚀 同步即時數據"; btn.disabled = false; }, 3000);
    }

    function calculate() {
        let totalCost = 0, totalVal = 0;
        stocks.forEach(s => {
            const sh = Number(document.getElementById('sh_'+s.id).value);
            const co = Number(document.getElementById('co_'+s.id).value);
            const pr = Number(document.getElementById('pr_'+s.id).value);
            if (sh > 0 && pr > 0) {
                const pl = (pr - co) * sh;
                const roi = ((pr - co) / co * 100).toFixed(2);
                totalCost += (sh * co); totalVal += (sh * pr);
                document.getElementById('pl_'+s.id).innerHTML = `<span class="${pl>=0?'profit':'loss'}">${pl.toLocaleString()}</span>`;
                document.getElementById('roi_'+s.id).innerHTML = `<span class="${pl>=0?'profit':'loss'}">${roi}%</span>`;
            }
        });
        const totalPL = totalVal - totalCost;
        const totalROI = totalCost > 0 ? (totalPL / totalCost * 100).toFixed(2) : 0;
        document.getElementById('summary').innerHTML = `
            總投入本金：<strong>${totalCost.toLocaleString()}</strong> 元 | 
            目前總現值：<strong>${totalVal.toLocaleString()}</strong> 元<br>
            總未實現損益：<span class="${totalPL>=0?'profit':'loss'}">${totalPL.toLocaleString()} 元 (${totalROI}%)</span>
        `;
    }
</script>

</body>
</html>
